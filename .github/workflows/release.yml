name: "release"

on:
  push:
    tags:
      - "*"
  workflow_dispatch:  # 手动触发

jobs:
  flutter-build-android:
    name: "Release for android"
    runs-on: "ubuntu-latest" 
    permissions: write-all
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Echo build progress
        run: echo "Android build start"
        shell: bash
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev ninja-build libayatana-appindicator3-dev libasound2-dev
        shell: bash
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
      - name: Get Flutter dependencies
        run: flutter pub get
        shell: bash
      - name: Build Flutter for Android
        run: flutter build apk --split-per-abi
        shell: bash
      - name: Set build version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "version=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV
          fi
        shell: bash
      - name: Package android build output
        run: |
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk Kazumi-Unlimited_android_${{ env.version }}.apk
        shell: bash
      - name: Upload android outputs
        uses: actions/upload-artifact@v4
        with:
          name: android_outputs
          path: Kazumi-Unlimited_android_*.apk

  flutter-build-windows:
    name: "Release for windows"
    runs-on: "windows-latest"
    permissions: write-all
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - run: echo "Windows build start"
      - run: choco install yq
      - name: Enable Git longpaths
        run: git config --system core.longpaths true
      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '18'
      - run: flutter pub get
      - run: flutter build windows   
      - name: Set build version
        run: |
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref }}".Replace('refs/tags/', '')
          } else {
            $version = Get-Date -Format "yyyyMMddHHmmss"
          }
          echo "version=$version" >> $env:GITHUB_ENV
      - run: |
          Compress-Archive build/windows/x64/runner/Release/* Kazumi-Unlimited_windows_${env:version}.zip
      - name: Upload windows outputs
        uses: actions/upload-artifact@v4
        with:
          name: windows_outputs
          path: Kazumi-Unlimited_windows_*.zip

  flutter-build-linux:
    name: "Release for Linux"
    runs-on: "ubuntu-latest" 
    permissions: write-all
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Echo build progress
        run: echo "Linux build start"
        shell: bash
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev ninja-build libayatana-appindicator3-dev unzip webkit2gtk-4.1 libasound2-dev
          sudo apt-get install -y gcc g++ autoconf automake debhelper glslang-dev ladspa-sdk xutils-dev libasound2-dev \
              libarchive-dev libbluray-dev libbs2b-dev libcaca-dev libcdio-paranoia-dev libdrm-dev \
              libdav1d-dev libdvdnav-dev libegl1-mesa-dev libepoxy-dev libfontconfig-dev libfreetype6-dev \
              libfribidi-dev libgl1-mesa-dev libgbm-dev libgme-dev libgsm1-dev libharfbuzz-dev libjpeg-dev \
              libbrotli-dev liblcms2-dev libmodplug-dev libmp3lame-dev libopenal-dev \
              libopus-dev libopencore-amrnb-dev libopencore-amrwb-dev libpulse-dev librtmp-dev \
              libsdl2-dev libsixel-dev libssh-dev libsoxr-dev libspeex-dev libtool \
              libv4l-dev libva-dev libvdpau-dev libvorbis-dev libvo-amrwbenc-dev \
              libunwind-dev libvpx-dev libwayland-dev libx11-dev libxext-dev \
              libxkbcommon-dev libxrandr-dev libxss-dev libxv-dev libxvidcore-dev \
              linux-libc-dev nasm ninja-build pkg-config python3 python3-docutils wayland-protocols \
              x11proto-core-dev zlib1g-dev libfdk-aac-dev libtheora-dev libwebp-dev \
              unixodbc-dev libpq-dev libxxhash-dev libaom-dev              
        shell: bash
      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
      - name: Get Flutter dependencies
        run: flutter pub get
        shell: bash
      - name: Build Flutter for Linux
        run: flutter build linux
        shell: bash
      - name: Set build version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "version=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV
          fi
        shell: bash
      - name: Package linux build output
        run: |
          # Tarball package
          tar -zcvf Kazumi-Unlimited_linux_${{ env.version }}_amd64.tar.gz -C build/linux/x64/release/bundle .
          # Debian package
          mkdir Kazumi-Unlimited_linux_${{ env.version }}_amd64
          cd Kazumi-Unlimited_linux_${{ env.version }}_amd64
          mkdir -p opt/Kazumi-Unlimited
          mkdir -p usr/share/applications
          mkdir -p usr/share/icons/hicolor/512x512/apps
          cp -r ../build/linux/x64/release/bundle/* opt/Kazumi-Unlimited
          cp -r ../assets/linux/DEBIAN .
          chmod 0755 DEBIAN/postinst
          chmod 0755 DEBIAN/postrm
          cat>DEBIAN/control<<EOF
          Maintainer: custom <your-email@example.com>
          Package: Kazumi-Unlimited
          Version: ${{ env.version }}
          Section: x11
          Priority: optional
          Architecture: amd64
          Essential: no
          Installed-Size: 34648
          Description: Watch Animes online with custom modification.
          Homepage: https://github.com/beijiushare/Kazumi-Unlimited
          Depends: libayatana-appindicator3-1,
                   gir1.2-ayatanaappindicator3-0.1,
                   libwebkit2gtk-4.1-0
          EOF
          cp ../assets/linux/io.github.Predidit.Kazumi.desktop usr/share/applications/io.github.beijiushare.Kazumi-Unlimited.desktop
          cp ../assets/images/logo/logo_linux.png usr/share/icons/hicolor/512x512/apps/io.github.beijiushare.Kazumi-Unlimited.png
          cd ..
          dpkg-deb --build --root-owner-group Kazumi-Unlimited_linux_${{ env.version }}_amd64
        shell: bash
      - name: Upload linux outputs
        uses: actions/upload-artifact@v4
        with:
          name: linux_outputs
          path: |
            Kazumi-Unlimited_linux_*.tar.gz
            Kazumi-Unlimited_linux_*.deb

  flutter-build-ios:
    name: "Release for iOS"
    runs-on: "macos-latest"
    permissions: write-all
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - run: echo "iOS build start"
      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
      - run: flutter pub get
      - name: Set build version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "version=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV
          fi
        shell: bash
      - name: Build IPA
        run: |
          flutter build ios --release --no-codesign
      - name: Create IPA
        run: |
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app Payload/Runner.app
          find Payload/Runner.app/Frameworks -type d -name "*.framework" -exec codesign --force --sign - --preserve-metadata=identifier,entitlements {} \;
          zip -q -r Kazumi-Unlimited_ios_${{ env.version }}_no_sign.ipa Payload
      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios_outputs
          path: Kazumi-Unlimited_ios_*.ipa

  release:
    name: "Create Release"
    runs-on: "ubuntu-latest"
    needs: [flutter-build-android, flutter-build-windows, flutter-build-linux, flutter-build-ios]
    permissions: write-all
    if: github.event_name == 'push' && github.ref_type == 'tag'
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Extract tag name
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
        shell: bash
        
      - name: Download android build file
        uses: actions/download-artifact@v4
        with:
          name: android_outputs
          path: android_outputs
      - name: Copy android build file to root
        run: cp android_outputs/* .
        
      - name: Download windows build file
        uses: actions/download-artifact@v4
        with:
          name: windows_outputs
          path: windows_outputs
      - name: Copy windows build file to root
        run: cp windows_outputs/* .
        
      - name: Download linux build file
        uses: actions/download-artifact@v4
        with:
          name: linux_outputs
          path: linux_outputs
      - name: Copy linux build file to root
        run: cp linux_outputs/* .
        
      - name: Download iOS build file
        uses: actions/download-artifact@v4
        with:
          name: ios_outputs
          path: ios_outputs
      - name: Copy iOS build file to root
        run: cp ios_outputs/* .
        
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Kazumi-Unlimited_android_*.apk
            Kazumi-Unlimited_windows_*.zip
            Kazumi-Unlimited_linux_*.tar.gz
            Kazumi-Unlimited_linux_*.deb
            Kazumi-Unlimited_ios_*.ipa


