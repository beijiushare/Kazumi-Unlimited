name: "Sync Upstream and Release"

on:
  workflow_dispatch:  # 仅手动触发同步

jobs:
  sync-upstream:
    name: "Sync upstream code and trigger release"
    runs-on: "ubuntu-latest"
    permissions: write-all
    steps:
      - name: Clone your forked repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Add upstream repository
        run: |
          # 原项目仓库地址
          git remote add upstream https://github.com/Predidit/Kazumi.git || true
          git fetch upstream

      - name: Check for upstream version updates
        id: check_update
        run: |
          git checkout main
          git fetch upstream main
          
          # 获取当前项目的版本号
          CURRENT_VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f 2)
          echo "Current version: $CURRENT_VERSION"
          
          # 获取上游项目的版本号
          UPSTREAM_VERSION=$(git show upstream/main:pubspec.yaml | grep '^version:' | cut -d ' ' -f 2)
          echo "Upstream version: $UPSTREAM_VERSION"
          
          # 比较版本号
          if [ "$CURRENT_VERSION" != "$UPSTREAM_VERSION" ]; then
            echo "has_update=true" >> $GITHUB_ENV
            echo "Upstream has new version: $UPSTREAM_VERSION, current version: $CURRENT_VERSION"
          else
            echo "has_update=false" >> $GITHUB_ENV
            echo "No version updates, skip sync."
          fi

      - name: Merge upstream updates to main branch
        if: env.has_update == 'true'
        run: |
          git merge upstream/main --no-edit
          git push origin main
          echo "Sync completed successfully!"

      - name: Skip sync if no updates
        if: env.has_update == 'false'
        run: |
          echo "No upstream updates to sync."
